<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Remote Cloud - Nexus OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --surface: rgba(17, 20, 28, 0.85);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --secondary: #7c4dff;
            --success: #00e676;
            --danger: #ff5252;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 0% 0%, #101827 0%, #05070a 100%);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-container {
            width: 95%;
            max-width: 1200px;
            margin: 40px auto;
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.2rem;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
            animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid var(--border);
        }

        .status-dot { height: 10px; width: 10px; background-color: #444; border-radius: 50%; transition: 0.3s; }
        .connected .status-dot { background-color: var(--success); box-shadow: 0 0 12px var(--success); }

        /* Auth Section */
        .auth-grid {
            max-width: 500px;
            margin: 4rem auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        input {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: white;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

        .btn {
            cursor: pointer;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: #000;
            font-weight: 700;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .btn-danger { background: var(--danger); color: white; }

        /* Main UI Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 28px;
        }

        .card {
            background: rgba(0,0,0,0.25);
            border-radius: 20px;
            padding: 22px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--accent);
            font-family: 'JetBrains Mono';
        }

        /* Viewport */
        .viewport-container {
            position: relative;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { max-width: 100%; max-height: 100%; display: block; }

        .viewport-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 14px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            font-family: 'JetBrains Mono';
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .console {
            margin-top: 24px;
            background: #000;
            border-radius: 14px;
            padding: 18px;
            font-family: 'JetBrains Mono';
            font-size: 0.75rem;
            color: var(--text-secondary);
            height: 120px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="glass-container">
        <div class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                ANTIGRAVITY CLOUD
            </div>
            <div id="status" class="status-badge">
                <span class="status-dot"></span> <span>OFFLINE</span>
            </div>
        </div>

        <div id="login-section">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 style="font-weight: 300;">Authentication Required</h1>
                <p style="color: var(--text-secondary);">Connect to a remote Nexus Relay node</p>
            </div>
            <div class="auth-grid">
                <input type="text" id="relay-url" placeholder="wss://relay-address.com">
                <input type="text" id="target-id" placeholder="Agent ID">
                <input type="password" id="agent-password" placeholder="Keyphrase">
                <button id="connect-btn" class="btn btn-primary">Establish Uplink</button>
            </div>
        </div>

        <div id="main-ui" class="hidden">
            <div class="dashboard-grid">
                <div class="sidebar">
                    <div class="card">
                        <div class="card-title">🚀 Performance</div>
                        <div class="stat-value"><span id="fps">0</span> <small style="font-size: 0.9rem; opacity: 0.5;">FPS</small></div>
                        <div style="margin-top: 20px;">
                            <label style="font-size: 0.65rem; color: var(--text-secondary);">JPEG UPLINK QUALITY</label>
                            <input type="range" id="quality" min="10" max="95" value="40" style="width: 100%; margin-top: 8px;">
                            <button id="stream-btn" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Start Stream</button>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">📁 Cloud Explorer</div>
                        <div id="current-path" style="font-size: 0.7rem; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">C:\</div>
                    </div>
                </div>

                <div class="main">
                    <div class="viewport-container">
                        <div id="placeholder" style="color: #444; text-align: center;">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity: 0.2; margin-bottom: 10px;"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                            <p style="opacity: 0.3;">Awaiting Signal...</p>
                        </div>
                        <canvas id="screen" class="hidden"></canvas>
                        <div class="viewport-overlay">SECURE CLOUD TETHER</div>
                    </div>
                    <div class="console" id="log">
                        [SYS] Cloud infrastructure ready.<br>
                        [SYS] Awaiting manual uplink establishment...<br>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let isStreaming = false;
        let frameCount = 0;
        let lastFPS = Date.now();

        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');
        const fpsEl = document.getElementById('fps');

        function appendLog(msg, type='info') {
            const color = type === 'error' ? 'var(--danger)' : 'var(--text-secondary)';
            logEl.innerHTML += `[${new Date().toLocaleTimeString()}] <span style="color:${color}">${msg}</span><br>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        document.getElementById('connect-btn').onclick = () => {
            const url = document.getElementById('relay-url').value;
            const id = document.getElementById('target-id').value;
            const pass = document.getElementById('agent-password').value;

            if(!url) return alert("Enter Relay URL!");

            socket = new WebSocket(url);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => {
                statusEl.classList.add('connected');
                statusEl.querySelector('span:last-child').innerText = 'CLOUD CONNECTED';
                socket.send(JSON.stringify({ type: 'register', role: 'viewer', targetId: id, password: pass }));
            };

            socket.onmessage = async (event) => {
                if (event.data instanceof ArrayBuffer) {
                    frameCount++;
                    const now = Date.now();
                    if (now - lastFPS >= 1000) {
                        fpsEl.innerText = frameCount;
                        frameCount = 0;
                        lastFPS = now;
                    }

                    const view = new DataView(event.data);
                    let offset = 0;
                    const tileCount = view.getUint16(offset);
                    offset += 2;

                    for (let i = 0; i < tileCount; i++) {
                        const x = view.getUint16(offset);
                        const y = view.getUint16(offset + 2);
                        const w = view.getUint16(offset + 4);
                        const h = view.getUint16(offset + 6);
                        const size = view.getUint32(offset + 8);
                        offset += 12;

                        const jpegData = event.data.slice(offset, offset + size);
                        offset += size;

                        const blob = new Blob([jpegData], { type: 'image/jpeg' });
                        const urlImg = URL.createObjectURL(blob);
                        const img = new Image();
                        img.onload = () => {
                            if (canvas.classList.contains('hidden')) {
                                canvas.classList.remove('hidden');
                                document.getElementById('placeholder').classList.add('hidden');
                            }
                            ctx.drawImage(img, x, y, w, h);
                            URL.revokeObjectURL(urlImg);
                        };
                        img.src = urlImg;
                    }
                    return;
                }

                const data = JSON.parse(event.data);
                if (data.type === 'registered') {
                    appendLog("Access Authorized. Tethering established.");
                    if (data.width) {
                        canvas.width = data.width;
                        canvas.height = data.height;
                    }
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                } else if (data.type === 'error') {
                    appendLog(data.message, 'error');
                }
            };
        };

        document.getElementById('stream-btn').onclick = function() {
            isStreaming = !isStreaming;
            this.innerText = isStreaming ? 'Terminate' : 'Start Stream';
            this.className = isStreaming ? 'btn btn-danger' : 'btn btn-primary';
            
            socket.send(JSON.stringify({ 
                type: isStreaming ? 'start_stream' : 'stop_stream',
                quality: parseInt(document.getElementById('quality').value)
            }));
        };

        // Interaction
        canvas.addEventListener('mousedown', (e) => sendMouse('mousedown', e));
        canvas.addEventListener('mouseup', (e) => sendMouse('mouseup', e));
        canvas.addEventListener('mousemove', (e) => { if (e.buttons === 1) sendMouse('mousemove', e); });

        function sendMouse(action, e) {
            if (!isStreaming) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            socket.send(JSON.stringify({ type: 'mouse_event', action, x, y }));
        }

        window.addEventListener('keydown', (e) => { 
            if (isStreaming) socket.send(JSON.stringify({ type: 'keyboard_event', key: e.key })); 
        });
    </script>
</body>
</html>
