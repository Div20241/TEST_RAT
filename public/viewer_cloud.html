<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Cloud - Pro Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --surface: rgba(17, 20, 28, 0.9);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --secondary: #7c4dff;
            --success: #00e676;
            --danger: #ff5252;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 100% 0%, #1a1a2e 0%, #05070a 100%);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-container {
            width: 95%;
            max-width: 1200px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 30px;
            background: rgba(0,0,0,0.4);
            font-size: 0.8rem;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .status-badge.connected { border-color: var(--success); color: var(--success); box-shadow: 0 0 15px rgba(0, 230, 118, 0.2); }

        /* Login */
        .login-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 4rem auto;
            text-align: center;
        }

        input, select, textarea {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: white;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.6); }

        .btn {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: #000;
            cursor: pointer;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px var(--accent-glow); filter: brightness(1.1); }

        /* Dashboard */
        .workspace { display: grid; grid-template-columns: 280px 1fr; gap: 24px; }
        
        .panel {
            background: rgba(0,0,0,0.2);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .stat-card { margin-bottom: 20px; }
        .stat-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-family: 'JetBrains Mono'; font-size: 2rem; color: var(--accent); }

        canvas {
            width: 100%;
            background: #000;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #log {
            margin-top: 20px;
            background: #010409;
            color: var(--text-secondary);
            padding: 15px;
            border-radius: 12px;
            font-family: 'JetBrains Mono';
            font-size: 0.75rem;
            height: 100px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="glass-container">
        <div class="header">
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                NEXUS CLOUD
            </div>
            <div id="status" class="status-badge">● OFFLINE</div>
        </div>

        <div id="login-section" class="login-box">
            <h2 style="font-weight: 300; margin-bottom: 2rem;">Cloud Terminal Auth</h2>
            <input type="text" id="relay-url" placeholder="wss://relay-link...">
            <input type="text" id="target-id" placeholder="Agent ID">
            <input type="password" id="agent-password" placeholder="Keyphrase">
            <button id="connect-btn" class="btn">Establish Uplink</button>
        </div>

        <div id="main-ui" class="hidden">
            <div class="workspace">
                <div class="sidebar">
                    <div class="panel stat-card">
                        <div class="stat-label">Frame Rate</div>
                        <div class="stat-value"><span id="fps">0</span> <small style="font-size: 1rem;">FPS</small></div>
                    </div>

                    <div class="panel">
                        <div class="stat-label">Streaming Config</div>
                        <label style="font-size: 0.65rem; display: block; margin: 10px 0 5px;">QUALITY</label>
                        <input type="range" id="quality" min="10" max="95" value="40" style="width: 100%;">
                        <button id="stream-btn" class="btn" style="width: 100%; margin-top: 20px; font-size: 0.7rem;">Init Stream</button>
                    </div>

                    <div id="log">>> Nexus protocol standby...</div>
                </div>

                <div class="viewport">
                    <canvas id="screen"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let isStreaming = false;
        let frameCount = 0;
        let lastFPS = Date.now();

        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');
        const fpsEl = document.getElementById('fps');

        function appendLog(msg) {
            logEl.innerHTML += `<br>> ${msg}`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        document.getElementById('connect-btn').onclick = () => {
            const url = document.getElementById('relay-url').value;
            const id = document.getElementById('target-id').value;
            const pass = document.getElementById('agent-password').value;

            if (!url) return alert("Missing Relay Link!");

            socket = new WebSocket(url);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => {
                statusEl.innerText = "● CLOUD CONNECTED";
                statusEl.classList.add('connected');
                socket.send(JSON.stringify({ type: 'register', role: 'viewer', targetId: id, password: pass }));
            };

            socket.onmessage = async (event) => {
                if (event.data instanceof ArrayBuffer) {
                    frameCount++;
                    const now = Date.now();
                    if (now - lastFPS >= 1000) {
                        fpsEl.innerText = frameCount;
                        frameCount = 0;
                        lastFPS = now;
                    }

                    // --- BINARY PROTOCOL DECODER ---
                    const view = new DataView(event.data);
                    let offset = 0;
                    const tileCount = view.getUint16(offset);
                    offset += 2;

                    for (let i = 0; i < tileCount; i++) {
                        const x = view.getUint16(offset);
                        const y = view.getUint16(offset + 2);
                        const w = view.getUint16(offset + 4);
                        const h = view.getUint16(offset + 6);
                        const size = view.getUint32(offset + 8);
                        offset += 12;

                        const jpegData = event.data.slice(offset, offset + size);
                        offset += size;

                        const blob = new Blob([jpegData], { type: 'image/jpeg' });
                        const urlImg = URL.createObjectURL(blob);
                        const img = new Image();
                        img.onload = () => {
                            ctx.drawImage(img, x, y, w, h);
                            URL.revokeObjectURL(urlImg);
                        };
                        img.src = urlImg;
                    }
                    return;
                }

                const data = JSON.parse(event.data);
                if (data.type === 'registered') {
                    appendLog("Uplink Secure. Authorization Granted.");
                    if (data.width) {
                        canvas.width = data.width;
                        canvas.height = data.height;
                    }
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                } else if (data.type === 'error') {
                    appendLog("AUTH ERROR: " + data.message);
                }
            };

            socket.onclose = () => {
                statusEl.innerText = "● DISCONNECTED";
                statusEl.classList.remove('connected');
            };
        };

        document.getElementById('stream-btn').onclick = function() {
            isStreaming = !isStreaming;
            this.innerText = isStreaming ? 'Kill Stream' : 'Init Stream';
            this.style.background = isStreaming ? 'var(--danger)' : '';
            
            socket.send(JSON.stringify({ 
                type: isStreaming ? 'start_stream' : 'stop_stream',
                quality: parseInt(document.getElementById('quality').value)
            }));
        };

        // Interaction (Mouse)
        canvas.addEventListener('mousedown', (e) => sendMouse('mousedown', e));
        canvas.addEventListener('mouseup', (e) => sendMouse('mouseup', e));
        canvas.addEventListener('mousemove', (e) => { if (e.buttons === 1) sendMouse('mousemove', e); });

        function sendMouse(action, e) {
            if (!isStreaming) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            socket.send(JSON.stringify({ type: 'mouse_event', action, x, y }));
        }
    </script>
</body>
</html>
